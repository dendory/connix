{
	"debug": false,
	"log": "connix.log",
	"db": "connix.db",
	"input": [
		{
			"id": "make table for csv",
			"module": "inittable",
			"mode": "create",
			"table": "emails",
			"columns": [
				{
					"name": "username",
					"type": "text",
					"primary": true
				},
				{
					"name": "name",
					"type": "text",
					"primary": false
				},
				{
					"name": "email",
					"type": "text",
					"primary": false
				},
				{
					"name": "age",
					"type": "number",
					"primary": false
				}
			]
		},
		{
			"id": "sample csv",
			"module": "CSV",
			"file": "data/sample.csv",
			"table": "emails",
			"mode": "merge",
			"delimiter": ","
		}
	],
	"output": [
	
	],
	"parse": [
	
	]
}