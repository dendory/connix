{
	"debug": true,
	"log": "connix.log",
	"db": "connix.db",
	"onerror": "continue",
	"input": [
		{
			"id": "make table for csv",
			"module": "inittable",
			"mode": "replace",
			"table": "emails",
			"onerror": "abort",
			"columns": [
				{
					"name": "username",
					"type": "text",
					"primary": true
				},
				{
					"name": "name",
					"type": "text",
					"primary": false
				},
				{
					"name": "email",
					"type": "text",
					"primary": false
				},
				{
					"name": "age",
					"type": "number",
					"primary": false
				}
			]
		},
		{
			"id": "sample csv",
			"module": "CSV",
			"file": "data/sample.csv",
			"table": "emails",
			"mode": "merge",
			"delimiter": ","
		},
		{
			"id": "an odbc database",
			"module": "odbc",
			"dsn": "DRIVER={SQL Server};SERVER=10.10.106.10;DATABASE=SampleData;UID=test1;PWD=test1",
			"query": "SELECT * FROM computers",
			"table": "computers",
			"mode": "merge"
		}
	],
	"parse": [
		{
			"id": "output csv",
			"module": "SQL",
			"query": "UPDATE emails SET age = age + 1;"
		}
	],
	"output": [
		{
			"id": "output csv",
			"module": "CSV",
			"file": "data/output.csv",
			"table": "emails"
		},
		{
			"id": "writing to a new odbc table",
			"module": "odbc",
			"dsn": "DRIVER={SQL Server};SERVER=10.10.106.10;DATABASE=SampleData;UID=test1;PWD=test1",
			"odbctable": "emails",
			"table": "emails",
			"mode": "clear"
		}
	]
}